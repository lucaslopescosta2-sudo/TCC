<!DOCTYPE html>

<html lang="en">

<head>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="static/style_controle.css">

    <title>ADICIONAR</title>

    <link rel="icon" href="static/download.png">



<style>

        body {

            background: #f4f4f4;

        }



        /* 1. TRAVA A ALTURA DA NAVBAR (Não deixa ela engrossar de jeito nenhum) */

        .navbar {

            background: #192A6B !important;

            height: 55px !important; /* Força a barra azul a ter sempre essa altura fina */

            padding: 0 !important;

            position: relative;

        }



        .navbar .container {

            height: 100%;

            position: relative; /* Base para o logo se guiar */

        }



        /* 2. FAZ O LOGO FLUTUAR (Pode aumentar o height à vontade aqui) */

        #logo_navbar {

            height: 100px !important;  /* <- AUMENTE OU DIMINUA AQUI O TAMANHO DO LOGO */

            width: auto !important;

            display: block !important;

           

            position: absolute !important;

            top: 50% !important;

            transform: translateY(-50%) !important; /* Centraliza verticalmente na marra */

            z-index: 9999 !important; /* Garante que fica por cima de tudo */

        }



        /* Garante que o link do logo não quebre o layout */

        .brand-container {

            position: relative;

            height: 100%;

            min-width: 160px;

            display: flex;

            align-items: center;

        }



        /* Alinha os textos do menu perfeitamente dentro da barra fina */

        .nav-link {

            color: white !important;

            font-weight: 500;

            line-height: 55px !important; /* Mesma altura da navbar para centralizar o texto */

            padding-top: 0 !important;

            padding-bottom: 0 !important;

        }



        .nav-link:hover {

            color: #F99203 !important;

        }



        /* Resto do seu estilo do painel e tabela */

        .titulo {

            background: #192A6B;

            color: white;

            text-align: center;

            padding: 18px;

            border-radius: 10px 10px 0 0;

            font-size: 30px;

        }



        .card {

            border: none;

            border-radius: 10px;

        }



        .table img {

            width: 65px;

            height: 65px;

            object-fit: cover;

            border-radius: 8px;

        }



        .badge {

            font-size: 15px;

        }

    </style>

</head>



<body>



    <!--NAV BAR-->

    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
    <div class="container">
        
        <div class="brand-container">
            <a class="navbar-brand m-0 p-0" href="/controle">
                <img id="logo_navbar" src="/static/SENAI.png" alt="SENAI Logo">
            </a>
        </div>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/">Inicio</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/controle">Estoque</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/movimentacao">Movimentação</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/adicionar">Adicionar novos itens</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/gerenciar_usuarios">Gerenciar Usuários</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

   

   

   





    <br>  

<br>



<div class="container mt-5">



    <div class="card shadow">



        <div class="card-header text-white" style="background-color: #192A6B;">

            <h3> Adicionar Itens</h3>

        </div>



        <div class="card-body">



            <form action="/adicionar" method="POST" enctype="multipart/form-data">

    <div class="row">
        <div class="col-md-6 mb-3">
            <label class="form-label">Nome do Item</label>
            <input type="text" name="produto" class="form-control" required>
        </div>

        <div class="col-md-3 mb-3">
            <label class="form-label">Categoria</label>
            <select name="categoria" class="form-select">
                <option value="EPIs">EPIs</option>
                <option value="ferramenta">Ferramentas</option>
            </select>
        </div>
    </div>

    <div class="row">
        <div class="col-md-3 mb-3">
            <label class="form-label">Quantidade</label>
            <input type="number" name="quantidade" class="form-control" required>
        </div>

        <div class="col-md-3 mb-3">
            <label class="form-label">Mínimo em Estoque</label>
            <input type="number" name="minimo" class="form-control" value="2" required>
        </div>
    </div>

    <div class="row">
        <div class="col-md-3 mb-3">
            <label class="form-label">Valor Unitário</label>
            <input type="text" name="preco" class="form-control" placeholder="0.00" required>
        </div>

        <div class="col-md-3 mb-3">
            <label class="form-label">Foto</label>
            <input type="file" name="foto" class="form-control" accept="image/*">
        </div>
    </div>

    <div class="mb-3">
        <label class="form-label">Descrição</label>
        <textarea name="descricao" class="form-control" rows="4"></textarea>
    </div>

    <div class="text-end">
    <a href="/controle" class="btn btn-secondary">Cancelar</a>
    <button type="submit" class="btn btn-success">Salvar Item</button>
</div>

</form>



        </div>



    </div>



</div>



</body>

</html>
