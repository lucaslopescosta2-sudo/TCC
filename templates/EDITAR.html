<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Usuário</title>
    <link rel="icon" href="static/download.png">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <style>
        body {
            background: #f4f4f4;
        }

        .navbar {
            background: #192A6B !important;
            height: 55px !important; 
            padding: 0 !important;
            position: relative;
        }

        .navbar .container {
            height: 100%;
            position: relative; 
        }

        #logo_navbar {
            height: 100px !important;  
            width: auto !important;
            display: block !important;
            position: absolute !important;
            top: 50% !important;
            transform: translateY(-50%) !important; 
            z-index: 9999 !important; 
        }

        .brand-container {
            position: relative;
            height: 100%;
            min-width: 160px;
            display: flex;
            align-items: center;
        }

        .nav-link {
            color: white !important;
            font-weight: 500;
            line-height: 55px !important; 
            padding-top: 0 !important;
            padding-bottom: 0 !important;
        }

        .nav-link:hover {
            color: #F99203 !important;
        }

        .titulo {
            background: #192A6B;
            color: white;
            text-align: center;
            padding: 18px;
            border-radius: 10px 10px 0 0;
            font-size: 30px;
        }

        .card {
            border: none;
            border-radius: 10px;
        }

        .form-label {
            font-weight: 600;
            color: #192A6B;
        }
    </style>
</head>


<body>

<nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
    <div class="container">
        
        <div class="brand-container">
            <a class="navbar-brand m-0 p-0" href="/controle">
                <img id="logo_navbar" src="/static/SENAI.png" alt="SENAI Logo">
            </a>
        </div>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">
            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" href="/">
                        Inicio
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link active" href="/controle">
                        Estoque
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/movimentacao">
                        Movimentação
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/adicionar">
                        Adicionar novos itens
                    </a>
                </li>

                <!-- NOVO MENU DE USUÁRIOS -->
                <li class="nav-item">
                    <a class="nav-link" href="/usuarios">
                        Gerenciar Usuários
                    </a>
                </li>

            </ul>
        </div>

    </div>
</nav>


<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow">
                <div class="titulo">
                    <i class="bi bi-pencil-square"></i> Editar Usuário
                </div>

                <div class="card-body p-4">

                    <form method="POST" action="/editar_usuario/{{ usuario[0] }}">

                        <div class="mb-3">
                            <label class="form-label">ID do Usuário</label>
                            <input type="text" class="form-control" value="{{ usuario[0] }}" disabled>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="usuario">Usuário (E-mail)</label>
                            <input
                                type="email"
                                class="form-control"
                                id="usuario"
                                name="usuario"
                                value="{{ usuario[1] }}"
                                required
                            >
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="senha">Nova Senha</label>
                            <input
                                type="password"
                                class="form-control"
                                id="senha"
                                name="senha"
                                placeholder="Deixe em branco para não alterar"
                            >
                            <div class="form-text">Preencha somente se quiser trocar a senha atual.</div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label" for="permissao">Permissão</label>
                            <select class="form-select" id="permissao" name="permissao" required>
                                <option value="Administrador" {% if usuario[2] == "Administrador" %}selected{% endif %}>
                                    Administrador
                                </option>
                                <option value="Funcionário" {% if usuario[2] == "Funcionário" %}selected{% endif %}>
                                    Funcionário
                                </option>
                            </select>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a href="/usuarios" class="btn btn-outline-secondary">
                                <i class="bi bi-arrow-left"></i> Cancelar
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-lg"></i> Salvar Alterações
                            </button>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
