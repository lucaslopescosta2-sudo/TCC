<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTROLE DE ESTOQUE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="static/style_controle.css">
    <link rel="icon" href="static/download.png">
</head>
<body>

   
   <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow" style="background-color: #192A6B !important;">
        <div class="container">


            <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link" href="/">Inicio</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#">Estoque</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/movimentacao">Movimentação</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/adicionar">Adicionar novos itens</a>
                    </li>


                </ul>
            </div>

        </div>
    </nav>
    
    <img id="logo_navbar" src="/static/SENAI.png">
    

    <br>   
<br>









<div class="container">

    <div class="titulo">
        <h2>CONTROLE DE ESTOQUE - ALMOX</h2>
    </div>

    <div class="tabela-container">

        <table class="table table-hover table-bordered mb-0" style="text-align: center !important;">

            <thead>
                <tr>
                    <th>CÓDIGO</th>
                    <th>MATERIAL</th>
                    <th>CATEGORIA</th>
                    <th>QUANTIDADE</th>
                    <th>PREÇO R$</th>
                    <th>FOTO</th>
                </tr>
            </thead>

        {% for item in resultado %}
        <tr>
            <td scope="col">{{item[0]}}</td>
            <td scope="col">{{item[1]}}</td>
            <td scope="col">{{item[6]}}</td>
            <td scope="col">{{item[2]}}</td>
            <td scope="col">{{item[4]}}</td>
            <td scope="col"><button type="button" class="btn btn-foto" onclick="mostrar_foto('{{item[7]}}')">Foto</button></td>
        </tr>
        {%endfor%}

        </table>

        <script>
            function mostrar_foto(argumento){
                swal.fire({
                imageUrl: argumento,
                });
            }
        </script>
    </div>

</div>

<!-- FOTO 1 -->
<div class="modal fade" id="foto1" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Capacete de Segurança</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body text-center">
                <img src="https://via.placeholder.com/500x300?text=Capacete"
                class="img-fluid rounded">
            </div>

        </div>
    </div>
</div>

<!-- FOTO 2 -->
<div class="modal fade" id="foto2" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Luva de Proteção</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body text-center">
                <img src="https://via.placeholder.com/500x300?text=Luva"
                class="img-fluid rounded">
            </div>

        </div>
    </div>
</div>

<!-- FOTO 3 -->
<div class="modal fade" id="foto3" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Parafuso M8</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body text-center">
                <img src="https://via.placeholder.com/500x300?text=Parafuso+M8"
                class="img-fluid rounded">
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
